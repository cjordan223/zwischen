name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rspec:
    name: RSpec (Ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.3", "3.4"]
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: bundle exec rspec

  gem-build:
    name: Gem builds and installs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
      - run: gem build zwischen.gemspec
      - run: gem install ./zwischen-*.gem
      - run: zwischen --help

  npm-smoke:
    name: npm wrapper smoke test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci || npm install
      - run: node bin/zwischen.js --help
      - run: npm pack --dry-run

  pip-smoke:
    name: pip wrapper smoke test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/pip
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install .
      - run: zwischen --help
      - run: pip install build && python -m build
