name: Release

# Publishes all three packages when a version tag is pushed:
#   git tag v0.1.0 && git push origin v0.1.0
#
# One-time setup required per registry (see DEVELOPMENT.md "Releasing"):
#   - RubyGems: add a trusted publisher (pending publisher for first release)
#     at rubygems.org/profile/oidc/pending_trusted_publishers
#   - PyPI: add a pending trusted publisher for "zwischen-cli"
#     at pypi.org/manage/account/publishing/
#   - npm: create an automation token and save it as the NPM_TOKEN repo secret

on:
  push:
    tags: ["v*"]

jobs:
  rubygems:
    name: Publish gem to RubyGems
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - uses: rubygems/release-gem@v1

  npm:
    name: Publish wrapper to npm
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages/npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org
      - run: npm install
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  pypi:
    name: Publish wrapper to PyPI
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages/pip
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build && python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/pip/dist
